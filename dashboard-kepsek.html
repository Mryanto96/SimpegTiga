<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kepsek - Absensi Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-small"><i class="fas fa-chalkboard-user"></i><span>Absensi Digital</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard"><i class="fas fa-home"></i> Dashboard</a>
                <a href="#" class="nav-item" data-page="teachers"><i class="fas fa-chalkboard-user"></i> Data Guru</a>
                <a href="#" class="nav-item" data-page="reports"><i class="fas fa-file-alt"></i> Laporan</a>
                <a href="#" class="nav-item" data-page="profile"><i class="fas fa-user"></i> Profil</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Loading...</p><small>Kepala Sekolah</small>
                    </div>
                </div>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button id="mobileMenuToggle" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
                <h2 id="pageTitle">Dashboard Kepsek</h2>
                <div class="date-time"><span id="currentDate"></span><span id="currentTime"></span></div>
            </header>

            <div class="content-area">
                <div id="pageDashboard" class="page active">
                    <div class="stats-grid">
                        <div class="stat-card"><i class="fas fa-users"></i>
                            <div>
                                <h3 id="totalGuru">0</h3>
                                <p>Total Guru</p>
                            </div>
                        </div>
                        <div class="stat-card"><i class="fas fa-calendar-check"></i>
                            <div>
                                <h3 id="totalHadirHariIni">0</h3>
                                <p>Hadir Hari Ini</p>
                            </div>
                        </div>
                        <div class="stat-card"><i class="fas fa-chart-line"></i>
                            <div>
                                <h3 id="rataKehadiran">0%</h3>
                                <p>Rata-rata Kehadiran</p>
                            </div>
                        </div>
                    </div>
                    <div class="info-card">
                        <h3>Rekap Cepat</h3>
                        <div id="rekapCepat">Memuat data...</div>
                    </div>
                </div>

                <div id="pageTeachers" class="page">
                    <h3>Data Guru</h3>
                    <div class="filter-bar"><input type="text" id="searchTeacher" placeholder="Cari nama atau email...">
                    </div>
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Nama</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="teachersBody"></tbody>
                        </table>
                    </div>
                    <div id="teacherDetail" class="teacher-detail" style="display:none;">
                        <h4>Detail Absensi</h4>
                        <div id="teacherAttendanceList"></div><button id="closeDetailBtn"
                            class="btn-text">Tutup</button>
                    </div>
                </div>

                <div id="pageReports" class="page">
                    <h3>Generate Laporan</h3>
                    <div class="report-form"><select id="reportMonth">
                            <option value="1">Januari</option>
                            <option value="2">Februari</option>
                            <option value="3">Maret</option>
                            <option value="4">April</option>
                            <option value="5">Mei</option>
                            <option value="6">Juni</option>
                            <option value="7">Juli</option>
                            <option value="8">Agustus</option>
                            <option value="9">September</option>
                            <option value="10">Oktober</option>
                            <option value="11">November</option>
                            <option value="12">Desember</option>
                        </select><select id="reportYear"></select><button id="generateReportBtn" class="btn-primary"><i
                                class="fas fa-download"></i> Generate & Kirim Email</button></div>
                    <div id="reportMessage" class="message"></div>
                </div>

                <div id="pageProfile" class="page">
                    <h3>Profil Saya</h3>
                    <div class="profile-card">
                        <div class="profile-field"><label>Nama</label>
                            <p id="profileName">-</p>
                        </div>
                        <div class="profile-field"><label>Email</label>
                            <p id="profileEmail">-</p>
                        </div>
                        <div class="profile-field"><label>Role</label>
                            <p id="profileRole">-</p>
                        </div>
                    </div>
                    <button id="changePasswordBtn" class="btn-secondary"><i class="fas fa-key"></i> Ganti
                        Password</button>
                </div>
            </div>
        </main>
    </div>

    <div id="changePasswordModal" class="modal">
        <div class="modal-content"><span class="close-modal">&times;</span>
            <h3>Ganti Password</h3><input type="password" id="newPassword1" placeholder="Password baru"><input
                type="password" id="newPassword2" placeholder="Konfirmasi"><button id="confirmChangePassword"
                class="btn-primary">Simpan</button>
            <div id="changePwMessage" class="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
